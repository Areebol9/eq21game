*{box-sizing:border-box;margin:0;padding:0}
body{

.share-card::before{

}

.share-logo{

  -webkit-text-fill-color:transparent;

  display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;
  margin-bottom:2px;
}
.share-logo-mark{
  display:inline-flex;width:.75em;height:.75em;
  color:#d8b76a;-webkit-text-fill-color:currentColor;

.share-logo-num{

  font-size:1.1em;font-weight:600;
  display:inline-block;transform:scaleX(.72);

.share-subtitle{
  font-size:.75em;color:rgba(201,169,110,.5);letter-spacing:.22em;
  font-style:italic;font-weight:400;margin-bottom:18px;

.share-cues{
  display:flex;gap:0;justify-content:center;align-items:flex-end;
  margin:0 auto 20px;min-height:56px;position:relative;isolation:isolate;
}
.share-cues::after{
  content:'';position:absolute;left:50%;bottom:2px;width:72px;height:10px;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at center,rgba(0,0,0,.08) 0%,rgba(0,0,0,0) 44%,transparent 72%);
  filter:blur(.3px);pointer-events:none;z-index:0;
}
.cue-card{
  width:36px;height:51px;border:1px solid rgba(154,139,95,.50);border-radius:6px;
  background:linear-gradient(145deg,#dfe5dc 0%,#cbd5cc 54%,#9daa9a 100%);

  position:relative;display:flex;align-items:center;justify-content:center;
  font-family:'Georgia','Times New Roman',serif;margin:0 -1px;
}
.cue-card:nth-child(1){transform:rotate(-5deg) translateY(2px) translateX(2px)}
.cue-card:nth-child(2){transform:rotate(0deg) translateY(-3px);z-index:2}
.cue-card:nth-child(3){transform:rotate(5deg) translateY(2px) translateX(-2px)}
.cue-card::before{
  content:'';position:absolute;inset:2px;border:1px solid rgba(91,98,73,.10);
  border-radius:4px;pointer-events:none;z-index:0;
}
.cue-s{
  font-size:13px;line-height:1;opacity:.88;position:relative;z-index:1;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.16));
}
.cue-corner{
  position:absolute;display:flex;flex-direction:column;align-items:center;
  line-height:1;font-style:normal;z-index:1;
}
.cue-corner.tl{top:3px;left:3px}
.cue-corner.br{bottom:3px;right:3px;transform:rotate(180deg)}
.cue-corner b{font-size:7px;font-weight:800;opacity:.85}
.cue-corner .suit-icon{width:5px;height:5px;opacity:.82}
.suit-red{color:#7f3f36}
.suit-black{color:#1c272b}
.suit-icon{display:inline-block;width:1em;height:1em;vertical-align:top}

.share-desc{
  color:rgba(224,216,200,.72);font-size:.88em;line-height:1.65;
  margin-bottom:24px;letter-spacing:.03em;
}

.share-actions{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;
}
.share-btn{
  flex:1 1 140px;max-width:180px;min-width:120px;height:44px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-size:.92em;font-weight:700;border:none;border-radius:8px;
  cursor:pointer;transition:transform .1s,opacity .2s,filter .15s;
  font-family:var(--font-main);
}
.share-btn:active{transform:scale(.96)}
.share-btn-primary{
  background:linear-gradient(135deg,var(--gold),#b8944e);color:#1a1a2e;
}
.share-btn-primary:hover{filter:brightness(1.08)}
.share-btn-secondary{
  background:rgba(180,150,100,0.1);color:var(--gold-light);border:1px solid var(--gold-dim);
}
.share-btn-secondary:hover{background:rgba(180,150,100,0.18)}
.share-btn-icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center}

.share-feedback{
  min-height:28px;color:var(--green);font-size:.82em;font-weight:600;
  opacity:0;transition:opacity .2s;
}
.share-feedback.show{opacity:1}

.share-cta{
  display:inline-flex;align-items:center;gap:6px;
  color:rgba(220,196,150,.5);font-size:.78em;font-weight:600;text-decoration:none;
  transition:color .2s;letter-spacing:.03em;
  margin-top:4px;
}
.share-cta:hover{color:rgba(245,235,210,.8)}
.share-cta-arrow{font-size:1.1em;transition:transform .2s}
.share-cta:hover .share-cta-arrow{transform:translateX(3px)}

.share-footer-ornament{
  margin-top:24px;color:rgba(201,169,110,.15);font-size:1.1em;letter-spacing:8px;
  user-select:none;

<script>
var HOST = (function() {
  if (window.location.protocol === 'file:') return 'https://eq21game.com/';
  return window.location.origin + '/';
})();

function copyLink() {
  var copy = function(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise(function(resolve, reject) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try { document.execCommand('copy'); resolve(); } catch (e) { reject(e); }
      document.body.removeChild(ta);
    });
  };
  copy(HOST).then(function() {
    var el = document.getElementById('copy-text');
    var fb = document.getElementById('feedback');
    el.textContent = '已复制！';
    fb.classList.add('show');
    setTimeout(function() {
      el.textContent = '复制链接';
      fb.classList.remove('show');
    }, 1800);
  }).catch(function() {
    var el = document.getElementById('copy-text');
    el.textContent = '复制失败';
    setTimeout(function() { el.textContent = '复制链接'; }, 1800);
  });
}

function doShare() {
  if (navigator.share) {
    navigator.share({
      title: 'Equation 21 - 算式21点',
      text: '在线数学纸牌游戏，用扑克牌和运算符组成等于21的算式！',
      url: HOST
    }).catch(function(){});
  } else {
    copyLink();
  }
}

(function() {
  if (!navigator.share) {
    var btn = document.getElementById('btn-share');
    btn.textContent = '复制链接';
    btn.onclick = copyLink;
  }
})();
</script>
